# SafeGuard - Mosquitto MQTT Broker

# ── Listeners ──────────────────────────────────────────────
per_listener_settings true

# TCP (padrao MQTT)
listener 1883
allow_anonymous true
max_connections -1

# WebSocket (para dashboards web)
listener 9001
protocol websockets
allow_anonymous true

# ── Persistencia ───────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_type all
log_timestamp true
