services:
  # ── MQTT Broker ──────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: safeguard-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - safeguard-net

  # ── Time Series Database ─────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: safeguard-influxdb
    restart: unless-stopped
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-safeguard2026}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-safeguard}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-sensors}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_ADMIN_TOKEN:-safeguard-token-2026}
      DOCKER_INFLUXDB_INIT_RETENTION: 30d
    volumes:
      - ./influxdb/data:/var/lib/influxdb2
    networks:
      - safeguard-net
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      retries: 5

  # ── Flow-Based Logic Engine ──────────────────────────────
  nodered:
    image: nodered/node-red:latest
    container_name: safeguard-nodered
    restart: unless-stopped
    ports:
      - "${NODERED_PORT:-1880}:1880"
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_ADMIN_TOKEN:-safeguard-token-2026}
      - TZ=America/Sao_Paulo
    volumes:
      - ./nodered/data:/data
    depends_on:
      - mosquitto
      - influxdb
    networks:
      - safeguard-net

  # ── Dashboard & Visualization ────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: safeguard-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-safeguard2026}
      - TZ=America/Sao_Paulo
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    networks:
      - safeguard-net

networks:
  safeguard-net:
    driver: bridge
